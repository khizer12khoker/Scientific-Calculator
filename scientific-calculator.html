<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scientific Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: monospace;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto 1fr;
    gap: 16px;
  }

  h1 {
    grid-column: 1 / -1;
    font-size: 20px;
    font-weight: bold;
    padding: 8px 0;
    border-bottom: 2px solid #333;
  }

  /* ── MAIN PANEL ── */
  .main-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* display area */
  .display-area {
    border: 1px solid #999;
    background: #fff;
    padding: 10px;
  }

  .display-area label {
    font-size: 11px;
    color: #666;
    display: block;
    margin-bottom: 4px;
  }

  #expression-input {
    width: 100%;
    font-family: monospace;
    font-size: 18px;
    padding: 6px 8px;
    border: 1px solid #999;
    background: #fffde7;
    outline: none;
  }

  #expression-input:focus { border-color: #333; }

  .output-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .output-label {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
  }

  #result-display {
    flex: 1;
    font-family: monospace;
    font-size: 20px;
    font-weight: bold;
    padding: 6px 8px;
    border: 1px solid #999;
    background: #e8f5e9;
    min-height: 36px;
    word-break: break-all;
  }

  #result-display.error {
    background: #ffebee;
    color: #c62828;
    font-size: 13px;
    font-weight: normal;
  }

  button.eval-btn {
    padding: 6px 18px;
    font-family: monospace;
    font-size: 15px;
    font-weight: bold;
    background: #333;
    color: #fff;
    border: none;
    cursor: pointer;
  }
  button.eval-btn:hover { background: #000; }

  /* ── BUTTONS GRID ── */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }

  .btn-grid button {
    padding: 10px 4px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    border: 1px solid #aaa;
    background: #fff;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-grid button:hover { background: #e0e0e0; }
  .btn-grid button:active { background: #bbb; }

  .btn-grid button.cat-num   { background: #fafafa; }
  .btn-grid button.cat-op    { background: #e3f2fd; }
  .btn-grid button.cat-fn    { background: #f3e5f5; }
  .btn-grid button.cat-const { background: #e8f5e9; }
  .btn-grid button.cat-ctrl  { background: #fff3e0; }
  .btn-grid button.cat-eval  { background: #333; color: #fff; }
  .btn-grid button.cat-eval:hover { background: #000; }

  /* ── VARIABLES SECTION ── */
  .section-title {
    font-size: 13px;
    font-weight: bold;
    border-bottom: 1px solid #aaa;
    padding-bottom: 4px;
    margin-bottom: 8px;
  }

  .variables-section { margin-top: 4px; }

  .var-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 5px;
    margin-bottom: 8px;
  }

  .var-form input {
    font-family: monospace;
    font-size: 13px;
    padding: 5px 6px;
    border: 1px solid #999;
  }

  .var-form button {
    font-family: monospace;
    font-size: 12px;
    padding: 5px 10px;
    background: #4caf50;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
  .var-form button:hover { background: #388e3c; }

  #var-error {
    font-size: 11px;
    color: #c62828;
    min-height: 16px;
    margin-bottom: 4px;
  }

  .var-list {
    border: 1px solid #ccc;
    background: #fff;
    max-height: 120px;
    overflow-y: auto;
    font-size: 12px;
  }

  .var-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border-bottom: 1px solid #eee;
  }
  .var-item:last-child { border-bottom: none; }
  .var-item span { color: #333; }
  .var-item button {
    font-size: 11px;
    padding: 1px 6px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    color: #c62828;
  }
  .var-item button:hover { background: #ffebee; }

  /* ── SIDE PANEL (history) ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid #aaa;
    background: #fff;
  }

  .side-panel .section-title {
    padding: 8px 10px 6px;
    margin: 0;
    border-bottom: 1px solid #aaa;
    background: #f5f5f5;
    font-size: 13px;
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    list-style: none;
  }

  .hist-item {
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .hist-item:hover { background: #f5f5f5; }

  .hist-expr {
    font-size: 12px;
    color: #555;
    word-break: break-all;
  }

  .hist-result {
    font-size: 14px;
    font-weight: bold;
    color: #1a237e;
  }

  .hist-del {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 11px;
    padding: 1px 5px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    color: #c62828;
    display: none;
  }
  .hist-item:hover .hist-del { display: block; }
  .hist-del:hover { background: #ffebee; }

  .hist-empty {
    padding: 16px 10px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>

<div class="app">
  <h1>Scientific Calculator</h1>

  <!-- MAIN PANEL -->
  <div class="main-panel">

    <!-- Display -->
    <div class="display-area">
      <label>Expression Input (editable):</label>
      <input type="text" id="expression-input" placeholder="e.g. sqrt(2) + sin(pi/2) * e^2" autocomplete="off" spellcheck="false"/>
      <div class="output-row">
        <span class="output-label">Result =</span>
        <div id="result-display"></div>
        <button class="eval-btn" id="eval-btn">Evaluate</button>
      </div>
    </div>

    <!-- Button Grid -->
    <div class="btn-grid" id="btn-grid">
      <!-- Row 1: trig/fn -->
      <button class="cat-fn"    data-insert="sin(">sin(</button>
      <button class="cat-fn"    data-insert="cos(">cos(</button>
      <button class="cat-fn"    data-insert="tan(">tan(</button>
      <button class="cat-fn"    data-insert="sqrt(">sqrt(</button>
      <button class="cat-const" data-insert="pi">pi</button>
      <button class="cat-const" data-insert="e">e</button>
      <!-- Row 2: numbers 7-9, ops -->
      <button class="cat-num" data-insert="7">7</button>
      <button class="cat-num" data-insert="8">8</button>
      <button class="cat-num" data-insert="9">9</button>
      <button class="cat-op"  data-insert="/">÷ /</button>
      <button class="cat-op"  data-insert="^">^ pow</button>
      <button class="cat-op"  data-insert="(">(</button>
      <!-- Row 3: numbers 4-6, ops -->
      <button class="cat-num" data-insert="4">4</button>
      <button class="cat-num" data-insert="5">5</button>
      <button class="cat-num" data-insert="6">6</button>
      <button class="cat-op"  data-insert="*">× *</button>
      <button class="cat-op"  data-insert="%">% mod</button>
      <button class="cat-op"  data-insert=")">)</button>
      <!-- Row 4: numbers 1-3, ops -->
      <button class="cat-num" data-insert="1">1</button>
      <button class="cat-num" data-insert="2">2</button>
      <button class="cat-num" data-insert="3">3</button>
      <button class="cat-op"  data-insert="-">− -</button>
      <button class="cat-op"  data-insert="+">+ plus</button>
      <button class="cat-op"  data-insert=".">.</button>
      <!-- Row 5: 0, clear, backspace, eval -->
      <button class="cat-num"  data-insert="0">0</button>
      <button class="cat-ctrl" data-action="clear">C</button>
      <button class="cat-ctrl" data-action="backspace">⌫</button>
      <button class="cat-eval" data-action="evaluate" style="grid-column: span 3">= Evaluate</button>
    </div>

    <!-- Variables -->
    <div class="variables-section">
      <div class="section-title">Variables &amp; Constants</div>
      <div class="var-form">
        <input type="text" id="var-name" placeholder="name (e.g. x)"/>
        <input type="text" id="var-value" placeholder="value (e.g. 5)"/>
        <button id="var-add-btn">Add</button>
      </div>
      <div id="var-error"></div>
      <div class="var-list" id="var-list"></div>
    </div>

  </div>

  <!-- SIDE PANEL: History -->
  <div class="side-panel">
    <div class="section-title">History</div>
    <ul id="history-list"></ul>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// MODULE 1 — EXPRESSION PARSER (ES6+)
// Custom recursive descent parser — no eval()
// Supports: +  -  *  /  ^  ()  sqrt  sin  cos  tan
// and user-defined variables/constants
// ═══════════════════════════════════════════════

const CONSTANTS = {
  pi: 3.141592653589793,
  e:  2.718281828459045,
};

// user-defined variables stored here
const userVars = {};

/**
 * Tokeniser — splits expression string into tokens
 * Token types: NUMBER | IDENT | OP | LPAREN | RPAREN
 */
const tokenise = (expr) => {
  const tokens = [];
  let i = 0;
  // trim whitespace first
  expr = expr.trim().replace(/\s+/g, '');

  while (i < expr.length) {
    const ch = expr[i];

    // number (int or float)
    if (/[0-9.]/.test(ch)) {
      let num = '';
      while (i < expr.length && /[0-9.]/.test(expr[i])) num += expr[i++];
      tokens.push({ type: 'NUMBER', value: parseFloat(num) });
      continue;
    }

    // identifier: letters only (function names, variable names)
    if (/[a-zA-Z_]/.test(ch)) {
      let name = '';
      while (i < expr.length && /[a-zA-Z_0-9]/.test(expr[i])) name += expr[i++];
      tokens.push({ type: 'IDENT', value: name });
      continue;
    }

    // single-char operators / parens
    if ('+-*/^%'.includes(ch)) {
      tokens.push({ type: 'OP', value: ch });
      i++; continue;
    }
    if (ch === '(') { tokens.push({ type: 'LPAREN' }); i++; continue; }
    if (ch === ')') { tokens.push({ type: 'RPAREN' }); i++; continue; }

    throw new Error(`Unknown character: "${ch}"`);
  }
  return tokens;
};

/**
 * Recursive descent parser + evaluator
 * Grammar:
 *   expr    = term  (('+' | '-') term)*
 *   term    = factor (('*' | '/') factor)*
 *   factor  = base ('^' factor)?        ← right-assoc
 *   base    = unary | NUMBER | IDENT | fn '(' expr ')' | '(' expr ')'
 */
class Parser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos    = 0;
  }

  peek()    { return this.tokens[this.pos]; }
  consume() { return this.tokens[this.pos++]; }

  expect(type) {
    const t = this.consume();
    if (!t || t.type !== type) throw new Error(`Expected ${type}`);
    return t;
  }

  parse() {
    if (this.tokens.length === 0) throw new Error('Empty expression');
    const result = this.parseExpr();
    if (this.peek()) throw new Error('Unexpected token: ' + JSON.stringify(this.peek().value ?? this.peek().type));
    return result;
  }

  parseExpr() {
    let left = this.parseTerm();
    while (this.peek()?.type === 'OP' && (this.peek().value === '+' || this.peek().value === '-')) {
      const op = this.consume().value;
      const right = this.parseTerm();
      left = op === '+' ? left + right : left - right;
    }
    return left;
  }

  parseTerm() {
    let left = this.parseFactor();
    while (this.peek()?.type === 'OP' && (this.peek().value === '*' || this.peek().value === '/' || this.peek().value === '%')) {
      const op = this.consume().value;
      const right = this.parseFactor();
      if (op === '/' && right === 0) throw new Error('Division by zero');
      if (op === '%' && right === 0) throw new Error('Modulo by zero');
      if      (op === '*') left = left * right;
      else if (op === '/') left = left / right;
      else                 left = left % right;
    }
    return left;
  }

  parseFactor() {
    const base = this.parseBase();
    if (this.peek()?.type === 'OP' && this.peek().value === '^') {
      this.consume();
      const exp = this.parseFactor(); // right-associative
      return Math.pow(base, exp);
    }
    return base;
  }

  parseBase() {
    const t = this.peek();
    if (!t) throw new Error('Unexpected end of expression');

    // unary minus
    if (t.type === 'OP' && t.value === '-') {
      this.consume();
      return -this.parseBase();
    }

    // unary plus
    if (t.type === 'OP' && t.value === '+') {
      this.consume();
      return this.parseBase();
    }

    // parenthesised group
    if (t.type === 'LPAREN') {
      this.consume();
      const val = this.parseExpr();
      this.expect('RPAREN');
      return val;
    }

    // number literal
    if (t.type === 'NUMBER') {
      this.consume();
      return t.value;
    }

    // identifier: function call OR constant/variable
    if (t.type === 'IDENT') {
      this.consume();
      const name = t.value;

      // function call: name(expr)
      const FUNCTIONS = ['sin', 'cos', 'tan', 'sqrt'];
      if (FUNCTIONS.includes(name)) {
        this.expect('LPAREN');
        const arg = this.parseExpr();
        this.expect('RPAREN');
        switch (name) {
          case 'sin':  return Math.sin(arg);
          case 'cos':  return Math.cos(arg);
          case 'tan':  return Math.tan(arg);
          case 'sqrt':
            if (arg < 0) throw new Error('sqrt of negative number');
            return Math.sqrt(arg);
        }
      }

      // built-in constants
      if (name in CONSTANTS) return CONSTANTS[name];

      // user variables
      if (name in userVars) return userVars[name];

      throw new Error(`Unknown variable or function: "${name}"`);
    }

    throw new Error(`Unexpected token: ${JSON.stringify(t)}`);
  }
}

/**
 * Public evaluate function
 * @param {string} expr
 * @returns {number}
 */
const evaluate = (expr) => {
  const tokens = tokenise(expr);
  const parser = new Parser(tokens);
  const result = parser.parse();
  if (!isFinite(result)) throw new Error('Result is not finite (overflow or undefined)');
  return result;
};


// ═══════════════════════════════════════════════
// MODULE 2 — HISTORY
// ═══════════════════════════════════════════════

const history = []; // array of { expr, result }

const renderHistory = () => {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<li class="hist-empty">No history yet.</li>';
    return;
  }
  list.innerHTML = '';
  // newest first
  [...history].reverse().forEach((item, reverseIdx) => {
    const realIdx = history.length - 1 - reverseIdx;
    const li = document.createElement('li');
    li.className = 'hist-item';
    li.innerHTML = `
      <div class="hist-expr">${escHtml(item.expr)}</div>
      <div class="hist-result">= ${escHtml(item.result)}</div>
      <button class="hist-del" data-idx="${realIdx}" title="Delete">✕</button>
    `;
    // click to fill expression input
    li.addEventListener('click', (e) => {
      if (e.target.classList.contains('hist-del')) return;
      document.getElementById('expression-input').value = item.expr;
    });
    list.appendChild(li);
  });
};

document.getElementById('history-list').addEventListener('click', (e) => {
  if (e.target.classList.contains('hist-del')) {
    const idx = parseInt(e.target.dataset.idx, 10);
    history.splice(idx, 1);
    renderHistory();
  }
});


// ═══════════════════════════════════════════════
// MODULE 3 — VARIABLES UI
// ═══════════════════════════════════════════════

const renderVars = () => {
  const list = document.getElementById('var-list');
  const names = Object.keys(userVars);
  if (names.length === 0) {
    list.innerHTML = '<div style="padding:8px;color:#aaa;font-size:12px;">No variables defined.</div>';
    return;
  }
  list.innerHTML = names.map(n => `
    <div class="var-item">
      <span><b>${escHtml(n)}</b> = ${escHtml(String(userVars[n]))}</span>
      <button data-var="${escHtml(n)}">delete</button>
    </div>
  `).join('');
};

document.getElementById('var-list').addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') {
    const varName = e.target.dataset.var;
    delete userVars[varName];
    renderVars();
  }
});

document.getElementById('var-add-btn').addEventListener('click', () => {
  const nameEl  = document.getElementById('var-name');
  const valueEl = document.getElementById('var-value');
  const errEl   = document.getElementById('var-error');
  const name    = nameEl.value.trim();
  const rawVal  = valueEl.value.trim();
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Variable name is required.'; return; }
  if (!/^[a-zA-Z_][a-zA-Z_0-9]*$/.test(name)) {
    errEl.textContent = 'Name must start with a letter and contain only letters/digits/_';
    return;
  }
  if (name in CONSTANTS) {
    errEl.textContent = `"${name}" is a reserved constant (pi, e).`;
    return;
  }
  if (['sin','cos','tan','sqrt'].includes(name)) {
    errEl.textContent = `"${name}" is a reserved function name.`;
    return;
  }
  const num = Number(rawVal);
  if (rawVal === '' || isNaN(num)) {
    errEl.textContent = 'Value must be a valid number.';
    return;
  }

  userVars[name] = num;
  nameEl.value  = '';
  valueEl.value = '';
  renderVars();
});


// ═══════════════════════════════════════════════
// MODULE 4 — EVALUATE & DISPLAY
// ═══════════════════════════════════════════════

const doEvaluate = () => {
  const exprInput = document.getElementById('expression-input');
  const resultDiv = document.getElementById('result-display');
  const expr = exprInput.value.trim();

  if (!expr) {
    resultDiv.textContent = '';
    resultDiv.className = '';
    return;
  }

  try {
    const raw    = evaluate(expr);
    const fixed  = raw.toFixed(4);
    resultDiv.textContent = fixed;
    resultDiv.className   = '';
    // save to history
    history.push({ expr, result: fixed });
    renderHistory();
  } catch (err) {
    resultDiv.textContent = `Error: ${err.message}`;
    resultDiv.className   = 'error';
  }
};

document.getElementById('eval-btn').addEventListener('click', doEvaluate);
document.getElementById('expression-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doEvaluate();
});


// ═══════════════════════════════════════════════
// MODULE 5 — BUTTON GRID
// ═══════════════════════════════════════════════

document.getElementById('btn-grid').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const action = btn.dataset.action;
  const insert = btn.dataset.insert;
  const input  = document.getElementById('expression-input');

  if (insert !== undefined) {
    // insert at cursor position
    const start = input.selectionStart;
    const end   = input.selectionEnd;
    const val   = input.value;
    input.value = val.slice(0, start) + insert + val.slice(end);
    const newPos = start + insert.length;
    input.setSelectionRange(newPos, newPos);
    input.focus();
    return;
  }

  if (action === 'clear') {
    input.value = '';
    document.getElementById('result-display').textContent = '';
    document.getElementById('result-display').className = '';
    input.focus();
    return;
  }

  if (action === 'backspace') {
    const start = input.selectionStart;
    const end   = input.selectionEnd;
    if (start !== end) {
      input.value = input.value.slice(0, start) + input.value.slice(end);
      input.setSelectionRange(start, start);
    } else if (start > 0) {
      input.value = input.value.slice(0, start - 1) + input.value.slice(start);
      input.setSelectionRange(start - 1, start - 1);
    }
    input.focus();
    return;
  }

  if (action === 'evaluate') {
    doEvaluate();
    return;
  }
});


// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const escHtml = (s) => String(s)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

// init renders
renderHistory();
renderVars();
</script>
</body>
</html>
